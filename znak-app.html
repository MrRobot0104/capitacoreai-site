<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>znak — AI Dashboard Builder | CapitaCoreAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #111111; color: #e0e0e0; -webkit-font-smoothing: antialiased; height: 100vh; overflow: hidden; }

    /* TOPBAR */
    .topbar { height: 56px; background: #1a1a1a; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-left a { display: flex; align-items: center; gap: 8px; text-decoration: none; color: #e0e0e0; font-weight: 600; font-size: 14px; }
    .topbar-left a img { width: 24px; height: 24px; }
    .topbar-left .sep { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }
    .topbar-left .app-name { font-size: 13px; font-weight: 500; color: #999999; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-btn { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #aaaaaa; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .topbar-btn:hover { background: rgba(255,255,255,0.05); color: #e0e0e0; }
    .topbar-btn.primary { background: #ffffff; color: #111111; border-color: #ffffff; }
    .topbar-btn.primary:hover { background: #e0e0e0; }
    .credits-chip { font-size: 12px; color: #999999; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 999px; }
    .credits-chip strong { color: #e0e0e0; }

    /* MAIN LAYOUT */
    .app-layout { display: flex; height: calc(100vh - 56px); }

    /* CHAT PANEL */
    .chat-panel { width: 420px; min-width: 380px; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.06); background: #111111; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .msg { max-width: 90%; }
    .msg.user { align-self: flex-end; }
    .msg.bot { align-self: flex-start; }
    .msg-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.65; }
    .msg.user .msg-bubble { background: #333333; color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot .msg-bubble { background: #1e1e1e; color: #cccccc; border-bottom-left-radius: 4px; }
    .msg .file-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #aaaaaa; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 8px; margin-bottom: 8px; }
    .msg .file-badge svg { flex-shrink: 0; }
    .msg-time { font-size: 11px; color: #777777; margin-top: 4px; }

    .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }
    .typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: #777777; animation: typingBounce 1.4s infinite ease-in-out both; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* CHAT INPUT */
    .chat-input-area { padding: 16px; border-top: 1px solid rgba(255,255,255,0.06); }
    .input-wrapper { background: #1e1e1e; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; display: flex; align-items: flex-end; padding: 8px 8px 8px 16px; gap: 8px; transition: border-color 0.2s; }
    .input-wrapper:focus-within { border-color: rgba(255,255,255,0.2); }
    .chat-textarea { flex: 1; background: none; border: none; color: #e0e0e0; font-size: 14px; font-family: inherit; resize: none; outline: none; max-height: 120px; line-height: 1.5; padding: 6px 0; }
    .chat-textarea::placeholder { color: #777777; }
    .input-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
    .btn-icon { width: 36px; height: 36px; border-radius: 10px; border: none; background: transparent; color: #999999; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .btn-icon:hover { background: rgba(255,255,255,0.08); color: #e0e0e0; }
    .btn-icon.send { background: #ffffff; color: #111111; }
    .btn-icon.send:hover { background: #e0e0e0; }
    .btn-icon:disabled { opacity: 0.3; cursor: not-allowed; }
    .file-input { display: none; }
    .file-preview { display: none; padding: 0 16px 8px; }
    .file-preview.active { display: flex; align-items: center; gap: 8px; }
    .file-chip { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08); color: #cccccc; font-size: 12px; padding: 6px 12px; border-radius: 8px; }
    .file-chip button { background: none; border: none; color: #cccccc; cursor: pointer; font-size: 14px; }

    .chat-limit-bar { padding: 12px 16px; text-align: center; }
    .limit-msg { font-size: 13px; color: #999999; margin-bottom: 8px; }
    .limit-actions { display: flex; gap: 8px; justify-content: center; }
    .limit-btn { padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; border: none; }
    .limit-btn.primary { background: #ffffff; color: #111111; }
    .limit-btn.primary:hover { background: #e0e0e0; }
    .limit-btn.secondary { background: rgba(255,255,255,0.05); color: #aaaaaa; border: 1px solid rgba(255,255,255,0.1); }
    .limit-btn.secondary:hover { background: rgba(255,255,255,0.08); }

    /* PREVIEW PANEL */
    .preview-panel { flex: 1; display: flex; flex-direction: column; background: #1a1a1a; }
    .preview-header { height: 48px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .preview-header span { font-size: 13px; color: #999999; font-weight: 500; }
    .preview-actions { display: flex; gap: 6px; }
    .preview-frame { flex: 1; background: #fff; }
    .preview-frame iframe { width: 100%; height: 100%; border: none; }
    .preview-empty { flex: 1; display: flex; align-items: center; justify-content: center; }
    .preview-empty-inner { text-align: center; }
    .preview-empty-inner .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.15; }
    .preview-empty-inner p { font-size: 14px; color: #777777; }
    .preview-empty-inner p.sub { font-size: 12px; color: #555555; margin-top: 4px; }

    @media (max-width: 900px) {
      .app-layout { flex-direction: column; }
      .chat-panel { width: 100%; min-width: auto; height: 55vh; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); }
      .preview-panel { height: 45vh; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="/"><img src="capitacoreai_logo_v2.png" alt="CC">CapitaCoreAI</a>
      <div class="sep"></div>
      <span class="app-name">znak</span>
    </div>
    <div class="topbar-right">
      <span class="credits-chip">Credits: <strong id="creditDisplay">—</strong></span>
      <button class="topbar-btn primary" id="newDashBtn" onclick="startNewDashboard()">+ New Dashboard</button>
      <a href="znak.html" class="topbar-btn">Buy Credits</a>
      <a href="account.html" class="topbar-btn">My Agents</a>
      <button class="topbar-btn" onclick="logout()">Log Out</button>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="app-layout">
    <!-- CHAT -->
    <div class="chat-panel">
      <div class="chat-messages" id="chatMessages">
        <div class="msg bot"><div class="msg-bubble">Hey! I'm znak. Describe the dashboard you need, or upload a CSV/Excel file and tell me what to build. I'll handle the rest.</div></div>
      </div>
      <div class="file-preview" id="filePreview">
        <div class="file-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span id="fileChipName"></span>
          <button onclick="removeFile()">&times;</button>
        </div>
      </div>
      <div class="chat-input-area" id="chatInputArea">
        <div class="input-wrapper">
          <textarea class="chat-textarea" id="chatTextarea" rows="1" placeholder="Describe your dashboard..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <div class="input-actions">
            <input type="file" class="file-input" id="fileInput" accept=".csv,.xlsx,.xls" onchange="handleFile(event)">
            <button class="btn-icon" onclick="document.getElementById('fileInput').click()" title="Upload CSV or Excel">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="btn-icon send" id="sendBtn" onclick="sendMessage()" title="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="chat-limit-bar" id="limitBar" style="display:none;">
        <p class="limit-msg" id="limitMsg"></p>
        <div class="limit-actions">
          <button class="limit-btn primary" id="continueBtn" onclick="continueConversation()">Add 25 more messages (1 credit)</button>
          <button class="limit-btn secondary" onclick="startNewDashboard()">New Dashboard</button>
        </div>
      </div>
    </div>

    <!-- DASHBOARD PREVIEW -->
    <div class="preview-panel">
      <div class="preview-header">
        <span>Dashboard Preview</span>
        <div class="preview-actions">
          <button class="topbar-btn" id="expandBtn" onclick="expandPreview()" style="display:none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            Expand
          </button>
          <button class="topbar-btn" id="downloadBtn" onclick="downloadDashboard()" style="display:none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
          </button>
        </div>
      </div>
      <div class="preview-empty" id="previewEmpty">
        <div class="preview-empty-inner">
          <div class="icon">📊</div>
          <p>Your dashboard will appear here</p>
          <p class="sub">Describe what you need or upload data to get started</p>
        </div>
      </div>
      <div class="preview-frame" id="previewFrame" style="display:none;">
        <iframe id="dashboardIframe"></iframe>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://bdlcgzdptcanoadxbhwv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbGNnemRwdGNhbm9hZHhiaHd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzAxODcsImV4cCI6MjA5MTQwNjE4N30.3AHqw9Hsqyup0Igb4n8zO-vBrae9vwQ7tHUjAP17Hi8';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const MSGS_PER_CREDIT = 25;
    let currentUser = null;
    let conversationHistory = [];
    let messageCount = 0;
    let messageLimit = MSGS_PER_CREDIT;
    let lastDashboardHtml = '';
    let uploadedFileData = null;
    let uploadedFileName = '';
    let creditBalance = 0;
    let conversationStarted = false;

    // AUTH
    let initDone = false;
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        // Wait a moment for session to load from storage, then check again
        setTimeout(async () => {
          const { data: { session: retrySession } } = await sb.auth.getSession();
          if (!retrySession) { window.location.href = 'account.html'; }
          else { currentUser = retrySession.user; await refreshCredits(); initDone = true; }
        }, 1000);
        return;
      }
      currentUser = session.user;
      await refreshCredits();
      initDone = true;
    }
    init();
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session && !initDone) {
        currentUser = session.user;
        refreshCredits();
        initDone = true;
      }
      if (event === 'SIGNED_OUT') { window.location.href = 'account.html'; }
    });

    let isAdmin = false;

    async function refreshCredits() {
      const { data } = await sb.from('profiles').select('token_balance, is_admin').eq('id', currentUser.id).single();
      isAdmin = data?.is_admin === true;
      creditBalance = isAdmin ? 9999 : (data ? data.token_balance : 0);
      document.getElementById('creditDisplay').textContent = isAdmin ? '∞' : creditBalance;
      if (creditBalance <= 0 && !conversationStarted) {
        addBotMessage("You don't have any credits. Purchase some to start building dashboards.");
        disableInput();
      }
    }

    async function logout() { await sb.auth.signOut(); window.location.href = '/'; }

    // FILE HANDLING
    function handleFile(e) {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 750 * 1024) {
        addBotMessage('File too large. Maximum size is 750KB.');
        e.target.value = '';
        return;
      }
      const ext = file.name.split('.').pop().toLowerCase();
      if (ext === 'csv') {
        Papa.parse(file, {
          header: true,
          preview: 100,
          complete: function(results) {
            uploadedFileData = results.data;
            uploadedFileName = file.name;
            showFilePreview(file.name);
          }
        });
      } else if (['xlsx', 'xls'].includes(ext)) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          const wb = XLSX.read(ev.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
          uploadedFileData = json.slice(0, 100);
          uploadedFileName = file.name;
          showFilePreview(file.name);
        };
        reader.readAsArrayBuffer(file);
      }
      e.target.value = '';
    }

    function showFilePreview(name) {
      document.getElementById('fileChipName').textContent = name;
      document.getElementById('filePreview').classList.add('active');
    }

    function removeFile() {
      uploadedFileData = null;
      uploadedFileName = '';
      document.getElementById('filePreview').classList.remove('active');
    }

    // TEXTAREA AUTO-RESIZE
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    // MESSAGES
    function addUserMessage(text, fileName) {
      const msgs = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'msg user';
      let html = '';
      if (fileName) html += '<div class="file-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' + fileName + '</div>';
      html += '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
      div.innerHTML = html;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function addBotMessage(text) {
      const msgs = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'msg bot';
      div.innerHTML = '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function addTyping() {
      const msgs = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'msg bot';
      div.id = 'typingMsg';
      div.innerHTML = '<div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }
    function removeTyping() { const el = document.getElementById('typingMsg'); if (el) el.remove(); }

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    function disableInput() {
      document.getElementById('chatInputArea').style.display = 'none';
    }
    function enableInput() {
      document.getElementById('chatInputArea').style.display = 'block';
      document.getElementById('limitBar').style.display = 'none';
    }

    function showLimitBar() {
      document.getElementById('chatInputArea').style.display = 'none';
      const bar = document.getElementById('limitBar');
      bar.style.display = 'block';
      if (creditBalance > 0) {
        document.getElementById('limitMsg').textContent = "You've reached the message limit for this dashboard.";
        document.getElementById('continueBtn').style.display = 'inline-block';
      } else {
        document.getElementById('limitMsg').textContent = "No credits remaining.";
        document.getElementById('continueBtn').style.display = 'none';
      }
    }

    // CONVERSATION CONTROL
    async function startNewDashboard() {
      if (creditBalance <= 0) { window.location.href = 'znak.html'; return; }
      // Deduct 1 credit for new conversation
      const { data: { session } } = await sb.auth.getSession();
      const res = await fetch('/api/znak-generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
        body: JSON.stringify({ action: 'start_conversation' })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addBotMessage(err.error || 'Failed to start. Please try again.');
        return;
      }
      // Reset state
      conversationHistory = [];
      messageCount = 0;
      messageLimit = MSGS_PER_CREDIT;
      lastDashboardHtml = '';
      conversationStarted = true;
      uploadedFileData = null;
      uploadedFileName = '';
      document.getElementById('filePreview').classList.remove('active');
      document.getElementById('chatMessages').innerHTML = '';
      document.getElementById('previewEmpty').style.display = 'flex';
      document.getElementById('previewFrame').style.display = 'none';
      document.getElementById('expandBtn').style.display = 'none';
      document.getElementById('downloadBtn').style.display = 'none';
      enableInput();
      addBotMessage("New dashboard started! Describe what you need or upload a data file. You have 25 messages to build and refine your dashboard.");
      await refreshCredits();
    }

    async function continueConversation() {
      const { data: { session } } = await sb.auth.getSession();
      const res = await fetch('/api/znak-generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
        body: JSON.stringify({ action: 'start_conversation' })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addBotMessage(err.error || 'Failed to add messages.');
        return;
      }
      messageLimit += MSGS_PER_CREDIT;
      enableInput();
      addBotMessage("25 more messages added! Keep refining your dashboard.");
      await refreshCredits();
    }

    // SEND MESSAGE
    async function sendMessage() {
      const textarea = document.getElementById('chatTextarea');
      const message = textarea.value.trim();
      if (!message && !uploadedFileData) return;

      // First message in a conversation — deduct credit
      if (!conversationStarted) {
        if (creditBalance <= 0) { window.location.href = 'znak.html'; return; }
        const { data: { session } } = await sb.auth.getSession();
        const res = await fetch('/api/znak-generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
          body: JSON.stringify({ action: 'start_conversation' })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          addBotMessage(err.error || 'Failed to start.');
          return;
        }
        conversationStarted = true;
        await refreshCredits();
      }

      if (messageCount >= messageLimit) { showLimitBar(); return; }

      // Build the user prompt
      let userContent = message;
      let fileContext = '';
      if (uploadedFileData) {
        const cols = Object.keys(uploadedFileData[0] || {});
        const sampleRows = uploadedFileData.slice(0, 50);
        // CSV format is more compact than JSON
        let csv = cols.join(',') + '\n';
        sampleRows.forEach(row => {
          csv += cols.map(c => {
            let v = String(row[c] || '');
            return v.includes(',') ? '"' + v + '"' : v;
          }).join(',') + '\n';
        });
        fileContext = '\n\n[Uploaded file: ' + uploadedFileName + ']\n' + uploadedFileData.length + ' total rows, ' + cols.length + ' columns.\nIMPORTANT: Use this actual data to populate ALL charts and tables. Every chart MUST have hardcoded data values from this dataset.\nData:\n' + csv.substring(0, 12000);
      }

      addUserMessage(message || 'Build a dashboard from this data', uploadedFileData ? uploadedFileName : null);
      textarea.value = '';
      textarea.style.height = 'auto';
      removeFile();

      const fullPrompt = (message || 'Build an interactive dashboard from this data') + fileContext;
      conversationHistory.push({ role: 'user', content: fullPrompt });
      messageCount++;

      document.getElementById('sendBtn').disabled = true;
      addBotMessage('Building your dashboard... this may take up to a minute.');
      addTyping();

      try {
        const { data: { session } } = await sb.auth.getSession();
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 300000); // 5 min timeout
        const res = await fetch('/api/znak-generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
          body: JSON.stringify({ action: 'generate', history: conversationHistory }),
          signal: controller.signal
        });
        clearTimeout(timeout);

        removeTyping();
        document.getElementById('sendBtn').disabled = false;

        // Parse response - handle HTML error pages from Vercel
        const responseText = await res.text();
        let data;
        try {
          data = JSON.parse(responseText);
        } catch (e) {
          addBotMessage('Server timed out or returned an error. Please try again.');
          messageCount--;
          return;
        }

        if (!res.ok) {
          addBotMessage(data.error || 'Something went wrong.');
          messageCount--;
          return;
        }

        lastDashboardHtml = data.html;
        // Store a summary of the HTML for edit context
        const htmlSummary = lastDashboardHtml.substring(0, 3000);
        conversationHistory.push({ role: 'assistant', content: htmlSummary });

        // Show dashboard
        document.getElementById('previewEmpty').style.display = 'none';
        document.getElementById('previewFrame').style.display = 'block';
        document.getElementById('expandBtn').style.display = 'inline-flex';
        document.getElementById('downloadBtn').style.display = 'inline-flex';
        // Use blob URL instead of srcdoc — allows Chart.js CDN to load
        const blob = new Blob([lastDashboardHtml], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);
        document.getElementById('dashboardIframe').src = blobUrl;

        const remaining = messageLimit - messageCount;
        addBotMessage("Dashboard ready! " + (remaining > 0 ? "You have " + remaining + " message" + (remaining === 1 ? '' : 's') + " left to refine it." : ""));

        if (messageCount >= messageLimit) {
          await refreshCredits();
          showLimitBar();
        }
      } catch (err) {
        removeTyping();
        document.getElementById('sendBtn').disabled = false;
        addBotMessage('Connection error. Please try again.');
        messageCount--;
      }
    }

    function expandPreview() {
      const win = window.open('', '_blank');
      win.document.write(lastDashboardHtml);
      win.document.close();
    }

    function downloadDashboard() {
      const blob = new Blob([lastDashboardHtml], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'dashboard.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>

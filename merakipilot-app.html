<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MerakiPilot — AI Network Operations | CapitaCoreAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0a; color: #ffffff; -webkit-font-smoothing: antialiased; height: 100vh; overflow: hidden; }

    /* TOPBAR */
    .topbar { height: 56px; background: rgba(10,10,10,0.95); border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; backdrop-filter: blur(20px); }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-left a { display: flex; align-items: center; gap: 8px; text-decoration: none; color: #ffffff; font-weight: 600; font-size: 14px; }
    .topbar-left a img { width: 24px; height: 24px; }
    .topbar-left .sep { width: 1px; height: 20px; background: rgba(255,255,255,0.12); }
    .topbar-left .app-name { font-size: 14px; font-weight: 600; color: #FF6A00; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-btn { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: rgba(255,255,255,0.5); cursor: pointer; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .topbar-btn:hover { background: rgba(255,255,255,0.05); color: #ffffff; border-color: rgba(255,255,255,0.2); }
    .status-chip { font-size: 12px; padding: 5px 12px; border-radius: 999px; border: 1px solid rgba(255,106,0,0.3); background: rgba(255,106,0,0.08); color: #FF6A00; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .status-chip .pulse { width: 6px; height: 6px; border-radius: 50%; background: #FF6A00; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-chip.disconnected { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); color: #ef4444; }
    .status-chip.disconnected .pulse { background: #ef4444; animation: none; }
    .credits-chip { font-size: 12px; color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.08); }
    .credits-chip strong { color: #FF6A00; }

    /* LAYOUT */
    .app-layout { display: flex; height: calc(100vh - 56px); }

    /* CHAT PANEL */
    .chat-panel { width: 400px; min-width: 400px; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.08); background: #0f0f0f; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .msg { max-width: 92%; }
    .msg.user { align-self: flex-end; }
    .msg.bot { align-self: flex-start; }
    .msg-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.65; }
    .msg.user .msg-bubble { background: #FF6A00; color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot .msg-bubble { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.06); }
    .msg.bot .msg-bubble strong { color: #ffffff; }
    .msg.bot .msg-bubble code { background: rgba(255,255,255,0.1); color: #FF6A00; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .msg.bot .msg-bubble a { color: #FF6A00; }
    .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }
    .typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: #FF6A00; animation: bounce 1.4s infinite ease-in-out both; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* INPUT */
    .chat-input-area { padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
    .chat-limit-bar { padding: 12px 16px; text-align: center; display: none; }
    .limit-msg { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
    .limit-actions { display: flex; gap: 8px; justify-content: center; }
    .limit-btn { padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; border: none; }
    .limit-btn.primary { background: #FF6A00; color: #fff; }
    .limit-btn.primary:hover { background: #FF8000; }
    .limit-btn.secondary { background: transparent; color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.12); text-decoration: none; display: inline-block; }
    .input-wrapper { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; display: flex; align-items: flex-end; padding: 8px 8px 8px 16px; gap: 8px; transition: border-color 0.2s; }
    .input-wrapper:focus-within { border-color: rgba(255,106,0,0.5); box-shadow: 0 0 0 3px rgba(255,106,0,0.06); }
    .chat-textarea { flex: 1; background: none; border: none; color: #ffffff; font-size: 14px; font-family: inherit; resize: none; outline: none; max-height: 120px; line-height: 1.5; padding: 6px 0; }
    .chat-textarea::placeholder { color: rgba(255,255,255,0.3); }
    .send-btn { width: 36px; height: 36px; border-radius: 10px; border: none; background: #FF6A00; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .send-btn:hover { background: #FF8000; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* NEURAL CANVAS */
    .network-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #0a0e17; position: relative; }
    #neuralCanvas { width: 100%; height: 100%; display: block; }
    .neural-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
    .neural-org { position: absolute; top: 20px; left: 24px; }
    .neural-org h2 { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.9); letter-spacing: -0.02em; }
    .neural-org p { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .neural-stats { position: absolute; top: 20px; right: 24px; display: flex; gap: 16px; }
    .neural-stat { text-align: right; }
    .neural-stat .ns-val { font-size: 22px; font-weight: 800; color: #FF6A00; font-family: 'Inter', monospace; }
    .neural-stat .ns-val.offline { color: #ef4444; }
    .neural-stat .ns-val.total { color: rgba(255,255,255,0.7); }
    .neural-stat .ns-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); }
    .neural-status { position: absolute; bottom: 20px; left: 24px; right: 24px; }
    .neural-status-text { font-size: 11px; color: rgba(255,106,0,0.7); font-family: 'Inter', monospace; letter-spacing: 0.02em; }
    .neural-status-text.analyzing { color: rgba(255,106,0,0.9); }
    .neural-status-text.acting { color: rgba(255,140,51,0.9); }

    @media (max-width: 768px) {
      .chat-panel { width: 100%; min-width: 100%; }
      .network-panel { display: none; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="/"><img src="logo.svg" alt="CapitaCoreAI">CapitaCoreAI</a>
      <div class="sep"></div>
      <span class="app-name">MerakiPilot</span>
    </div>
    <div class="topbar-right">
      <div class="status-chip disconnected" id="statusChip">
        <span class="pulse"></span>
        <span id="statusText">Not Connected</span>
      </div>
      <span class="credits-chip" id="creditDisplay" style="display:none;"><strong id="creditCount">0</strong> credits</span>
      <a href="merakipilot.html" class="topbar-btn">About</a>
      <a href="agents.html" class="topbar-btn">All Agents</a>
    </div>
  </div>

  <!-- APP LAYOUT -->
  <div class="app-layout">

    <!-- CHAT -->
    <div class="chat-panel">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-limit-bar" id="limitBar">
        <p class="limit-msg" id="limitMsg">You've used all messages for this credit.</p>
        <div class="limit-actions">
          <button class="limit-btn primary" id="continueBtn">Continue (1 credit)</button>
          <a href="pricing.html" class="limit-btn secondary">Buy Credits</a>
        </div>
      </div>
      <div class="chat-input-area" id="chatInputArea">
        <div class="input-wrapper">
          <textarea class="chat-textarea" id="chatInput" placeholder="Paste your Meraki API key or ask a question..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- NEURAL VISUALIZATION PANEL -->
    <div class="network-panel">
      <canvas id="neuralCanvas"></canvas>
      <div class="neural-overlay">
        <div class="neural-org">
          <h2 id="orgName">MerakiPilot</h2>
          <p id="orgMeta">Connect your API key to begin</p>
        </div>
        <div class="neural-stats" id="neuralStats" style="display:none;">
          <div class="neural-stat"><div class="ns-val total" id="statDevices">0</div><div class="ns-label">Devices</div></div>
          <div class="neural-stat"><div class="ns-val" id="statOnline">0</div><div class="ns-label">Online</div></div>
          <div class="neural-stat"><div class="ns-val offline" id="statOffline">0</div><div class="ns-label">Offline</div></div>
          <div class="neural-stat"><div class="ns-val total" id="statNetworks">0</div><div class="ns-label">Networks</div></div>
        </div>
        <div class="neural-status">
          <div class="neural-status-text" id="neuralStatus">Awaiting connection...</div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/neural-viz.js"></script>
  <script src="js/merakipilot-app.js"></script>
</body>
</html>
